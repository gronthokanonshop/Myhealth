<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Health — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20100%20100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2248%22%20fill%3D%22%23ffffff%22%2F%3E%3Cpath%20d%3D%22M50%2076%20C31%2059%2021%2047%2021%2037.5%20C21%2029%2027.5%2023.5%2035%2023.5%20C41%2023.5%2046%2027.5%2050%2033.5%20C54%2027.5%2059%2023.5%2065%2023.5%20C72.5%2023.5%2079%2029%2079%2037.5%20C79%2047%2069%2059%2050%2076%20Z%22%20fill%3D%22%23EA7317%22%2F%3E%3Cpolyline%20points%3D%2227%2C49%2040%2C49%2044%2C40%2050%2C59%2055%2C35%2060%2C49%2073%2C49%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%224.5%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E">
<link rel="stylesheet" href="style.css">
<style>
/* ---- Admin-only styles (storefront vars/fonts come from style.css) ---- */
body{ background:#eef3ef; }
.admin-wrap{ display:flex; min-height:100vh; }

/* ===================== SIDEBAR (desktop) ===================== */
.side{ width:236px; background:var(--pine); color:#ffe0c4; flex:0 0 auto; display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; z-index:20; }
.side .brand{ display:flex; align-items:center; gap:10px; padding:20px 18px; font-family:var(--display);
  font-weight:800; font-size:19px; color:#fff; border-bottom:1px solid rgba(255,255,255,.1); }
.side .brand .mark{ width:42px; height:42px; flex:0 0 auto; background:url("data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20100%20100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2248%22%20fill%3D%22%23ffffff%22%2F%3E%3Cpath%20d%3D%22M50%2076%20C31%2059%2021%2047%2021%2037.5%20C21%2029%2027.5%2023.5%2035%2023.5%20C41%2023.5%2046%2027.5%2050%2033.5%20C54%2027.5%2059%2023.5%2065%2023.5%20C72.5%2023.5%2079%2029%2079%2037.5%20C79%2047%2069%2059%2050%2076%20Z%22%20fill%3D%22%23EA7317%22%2F%3E%3Cpolyline%20points%3D%2227%2C49%2040%2C49%2044%2C40%2050%2C59%2055%2C35%2060%2C49%2073%2C49%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%224.5%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E") center/contain no-repeat; }
.side .brand .mark::after{ content:none; }
.side .brand small{ display:block; font-family:var(--body); font-weight:500; font-size:10px; color:#e8b98a; letter-spacing:.08em; text-transform:uppercase; }
.side .brand .bwm{ display:flex; flex-direction:column; gap:1px; }
.side .brand .bn{ font-family:var(--display); font-weight:800; font-size:20px; line-height:1; color:#fff; }
.side .brand .bn .o, .login .lg .bn .o{ color:var(--leaf); }
.login .lg .bn{ font-family:var(--display); font-weight:800; font-size:23px; }
.side nav{ padding:12px; display:flex; flex-direction:column; gap:3px; flex:1; }
.side nav button{ display:flex; align-items:center; gap:11px; padding:11px 14px; border-radius:10px; color:#ffe0c4;
  font-weight:600; font-size:14px; text-align:left; transition:.15s; width:100%; }
.side nav button:hover{ background:rgba(255,255,255,.08); color:#fff; }
.side nav button.on{ background:var(--leaf); color:#fff; }
.side nav .ic{ width:20px; text-align:center; font-size:16px; flex:0 0 auto; }
.side .logout{ margin:12px; padding:11px 14px; border-radius:10px; background:rgba(255,255,255,.08); color:#fff;
  font-weight:600; font-size:14px; display:flex; align-items:center; gap:10px; justify-content:center; width:calc(100% - 24px); }
.side .logout:hover{ background:var(--rose); }

/* ===================== MAIN AREA ===================== */
.main{ flex:1; min-width:0; }
.topbar{ background:#fff; border-bottom:1px solid var(--line); padding:14px 24px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:10; gap:10px; }
.topbar h1{ font-size:20px; }
.topbar .who{ font-size:13px; color:var(--muted); white-space:nowrap; }
.content{ padding:20px 24px; max-width:1100px; padding-bottom:32px; }

/* ===================== STAT CARDS ===================== */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
.stat{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:16px 18px; }
.stat .lbl{ font-size:12px; color:var(--muted); font-weight:600; }
.stat .val{ font-family:var(--display); font-weight:800; font-size:26px; margin-top:5px; }
.stat .ic{ float:right; font-size:24px; opacity:.85; }
.stat.green .val{ color:var(--leaf); } .stat.amber .val{ color:var(--amber); } .stat.rose .val{ color:var(--rose); }

/* ===================== PANEL / SECTION CARD ===================== */
.panel{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:0; overflow:hidden; margin-bottom:20px; }
.panel-head{ padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.panel-head h2{ font-size:16px; }
.panel-tools{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.panel-tools input, .panel-tools select{ height:36px; border:1.5px solid var(--line); border-radius:9px; padding:0 10px; font-size:14px; font-family:inherit; }

/* ===================== BUTTONS ===================== */
.b{ height:38px; padding:0 16px; border-radius:9px; font-weight:700; font-size:14px; display:inline-flex; align-items:center; gap:7px; cursor:pointer; }
.b-green{ background:var(--leaf); color:#fff; } .b-green:hover{ background:var(--leaf-d); }
.b-ghost{ background:#fff; border:1.5px solid var(--line); color:var(--ink); } .b-ghost:hover{ border-color:var(--leaf); color:var(--leaf); }
.b-rose{ background:#fff; border:1.5px solid #f3c6cf; color:var(--rose); } .b-rose:hover{ background:var(--rose); color:#fff; }
.b-sm{ height:32px; padding:0 11px; font-size:13px; border-radius:8px; }

/* ===================== TABLE (desktop) ===================== */
.table-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
table{ width:100%; border-collapse:collapse; font-size:14px; min-width:540px; }
th{ text-align:left; padding:11px 14px; background:#f6f9f5; color:var(--muted); font-weight:700; font-size:11px;
  text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--line); }
td{ padding:11px 14px; border-bottom:1px solid var(--line); vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
.t-img{ width:40px; height:40px; border-radius:9px; object-fit:cover; background:#f5ece2; }
.t-emoji{ width:40px; height:40px; border-radius:9px; background:#f5ece2; display:grid; place-items:center; font-size:20px; }
.pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.pill.goal{ background:#fdeede; color:var(--leaf-d); }
.tag-mini{ font-size:11px; color:var(--muted); }
.row-acts{ display:flex; gap:6px; }

/* ===================== STATUS SELECT ===================== */
.status{ border:1.5px solid var(--line); border-radius:8px; padding:5px 8px; font-size:13px; font-weight:600; font-family:inherit; }
.status[data-s="pending"]{ color:var(--amber); border-color:#f6dcae; background:#fff8ee; }
.status[data-s="confirmed"]{ color:#2563EB; border-color:#c5d8fb; background:#eff5ff; }
.status[data-s="delivered"]{ color:var(--leaf-d); border-color:#f5d0b0; background:#fff1e6; }
.status[data-s="cancelled"]{ color:var(--rose); border-color:#f3c6cf; background:#fff5f6; }

.empty{ text-align:center; padding:40px 20px; color:var(--muted); }
.empty .e{ font-size:44px; margin-bottom:8px; }

/* ===================== MODAL ===================== */
.modal-bg{ position:fixed; inset:0; background:rgba(74,34,8,.55); display:none; align-items:flex-start; justify-content:center;
  padding:20px 12px; z-index:100; overflow-y:auto; }
.modal-bg.open{ display:flex; }
.modal{ background:#fff; border-radius:var(--r-lg); width:100%; max-width:600px; }
.modal-head{ padding:16px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.modal-head h3{ font-size:18px; } .modal-head button{ font-size:26px; color:var(--muted); line-height:1; }
.modal-body{ padding:18px 20px; max-height:70vh; overflow-y:auto; }
.modal-foot{ padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; }
.fld{ margin-bottom:13px; } .fld label{ display:block; font-size:13px; font-weight:600; margin-bottom:5px; }
.fld input, .fld select, .fld textarea{ width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px;
  font-size:15px; font-family:inherit; outline:none; }
.fld input:focus, .fld select:focus, .fld textarea:focus{ border-color:var(--leaf); }
.fld textarea{ resize:vertical; min-height:64px; }
.g2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; } 
.g3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* ===================== ORDER DETAILS ===================== */
.od-row{ display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }
.od-items{ border:1px solid var(--line); border-radius:10px; margin:10px 0; }
.od-items .it{ display:flex; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--line); font-size:14px; }
.od-items .it:last-child{ border-bottom:none; }
.note-box{ background:#fff8ee; border:1px solid #f6dcae; border-radius:10px; padding:12px 14px; font-size:13px; color:#8a6d2f; margin-top:14px; }

/* ===================== LOGIN ===================== */
.login-bg{ min-height:100vh; display:grid; place-items:center; background:
  radial-gradient(120% 120% at 100% 0%, rgba(255,195,104,.25), transparent 55%), linear-gradient(145deg,var(--pine),#5e2b08); padding:16px; }
.login{ background:#fff; border-radius:var(--r-lg); padding:30px 26px; width:100%; max-width:380px; box-shadow:var(--shadow-h); }
.login .lg{ display:flex; align-items:center; gap:10px; font-family:var(--display); font-weight:800; font-size:22px; color:var(--pine); margin-bottom:6px; }
.login .lg .mark{ width:48px; height:48px; flex:0 0 auto; background:url("data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20100%20100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2248%22%20fill%3D%22%23ffffff%22%2F%3E%3Cpath%20d%3D%22M50%2076%20C31%2059%2021%2047%2021%2037.5%20C21%2029%2027.5%2023.5%2035%2023.5%20C41%2023.5%2046%2027.5%2050%2033.5%20C54%2027.5%2059%2023.5%2065%2023.5%20C72.5%2023.5%2079%2029%2079%2037.5%20C79%2047%2069%2059%2050%2076%20Z%22%20fill%3D%22%23EA7317%22%2F%3E%3Cpolyline%20points%3D%2227%2C49%2040%2C49%2044%2C40%2050%2C59%2055%2C35%2060%2C49%2073%2C49%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%224.5%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E") center/contain no-repeat; }
.login .lg .mark::after{ content:none; }
.login p{ color:var(--muted); font-size:14px; margin:0 0 20px; }
.login label{ font-size:13px; font-weight:600; display:block; margin-bottom:6px; }
.login input{ width:100%; height:48px; border:1.5px solid var(--line); border-radius:12px; padding:0 16px; font-size:15px; outline:none; }
.login input:focus{ border-color:var(--leaf); }
.login .b-green{ width:100%; height:50px; margin-top:16px; font-size:16px; border-radius:12px; justify-content:center; }
.login .err{ color:var(--rose); font-size:13px; margin-top:10px; min-height:18px; }
.login .hint{ font-size:12px; color:var(--muted); margin-top:14px; text-align:center; }

/* ===================== MOBILE BOTTOM NAV ===================== */
.mob-nav{ display:none; }

/* ===================== MOBILE CARD ROWS (orders/products) ===================== */
.m-card-list{ display:none; }
.m-card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; }
.m-card-top{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.m-card-body{ font-size:13px; }
.m-card-row{ display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid var(--line); }
.m-card-row:last-child{ border-bottom:none; }
.m-card-row span{ color:var(--muted); font-size:12px; }
.m-card-acts{ display:flex; gap:8px; margin-top:12px; }
.m-card-acts .b{ flex:1; justify-content:center; }

/* ===================== CATEGORY MULTI-SELECT DROPDOWN ===================== */
.msd{ position:relative; }
.msd-trigger{
  width:100%; min-height:44px; border:1.5px solid var(--line); border-radius:10px;
  padding:6px 36px 6px 10px; display:flex; align-items:center; flex-wrap:wrap; gap:5px;
  cursor:pointer; background:#fff; transition:.15s; text-align:left; position:relative;
}
.msd-trigger:hover, .msd.open .msd-trigger{ border-color:var(--leaf); }
.msd-trigger::after{
  content:"▾"; position:absolute; right:12px; top:50%; transform:translateY(-50%);
  font-size:14px; color:var(--muted); transition:.2s; pointer-events:none;
}
.msd.open .msd-trigger::after{ transform:translateY(-50%) rotate(180deg); }
.msd-placeholder{ font-size:14px; color:var(--muted); }
.msd-pill{
  display:inline-flex; align-items:center; gap:4px; padding:3px 8px 3px 8px;
  border-radius:999px; background:#eaf5ea; color:var(--leaf-d);
  font-size:12px; font-weight:700; white-space:nowrap;
}
.msd-pill .rm{
  font-size:14px; line-height:1; cursor:pointer; color:var(--leaf-d);
  opacity:.6; margin-left:1px; padding:0 1px;
}
.msd-pill .rm:hover{ opacity:1; }
.msd-menu{
  position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:200;
  background:#fff; border:1.5px solid var(--leaf); border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.13); overflow:hidden; display:none;
}
.msd.open .msd-menu{ display:block; }
.msd-search{
  padding:10px 12px 6px; border-bottom:1px solid var(--line);
}
.msd-search input{
  width:100%; border:1.5px solid var(--line); border-radius:8px;
  padding:7px 10px; font-size:13px; font-family:inherit; outline:none;
}
.msd-search input:focus{ border-color:var(--leaf); }
.msd-list{ max-height:224px; overflow-y:auto; padding:6px; }
.msd-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px;
  border-radius:8px; cursor:pointer; font-size:14px; font-weight:500;
  transition:.12s; user-select:none;
}
.msd-item:hover{ background:#f6faf5; }
.msd-item.on{ background:#eaf5ea; color:var(--leaf-d); font-weight:700; }
.msd-item .msd-cb{
  width:18px; height:18px; border:2px solid var(--line); border-radius:5px;
  flex:0 0 auto; display:grid; place-items:center; font-size:12px; transition:.12s;
}
.msd-item.on .msd-cb{ background:var(--leaf); border-color:var(--leaf); color:#fff; }
.msd-footer{
  padding:8px 12px; border-top:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
  font-size:12px; color:var(--muted);
}
.msd-footer button{ font-size:12px; color:var(--leaf); font-weight:700; cursor:pointer; }

/* ===================== STOCK TOGGLE ===================== */
.stock-toggle{ padding:6px 14px; border-radius:999px; font-size:12px; font-weight:700;
  border:none; cursor:pointer; transition:.15s; white-space:nowrap; }
.stock-toggle.in { background:#e6f5e9; color:#1a7a35; }
.stock-toggle.in:hover { background:#c8eacf; }
.stock-toggle.out{ background:#ffe4e4; color:#c0392b; }
.stock-toggle.out:hover{ background:#ffc9c9; }

/* ===================== COURIER ===================== */
.courier-card{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:16px 18px;
  display:flex; align-items:center; gap:14px; margin-bottom:10px; }
.courier-card .cc-logo{ width:44px; height:44px; border-radius:10px; background:var(--cream);
  display:grid; place-items:center; font-size:22px; flex:0 0 auto; }
.courier-card .cc-info{ flex:1; min-width:0; }
.courier-card .cc-name{ font-weight:800; font-size:15px; }
.courier-card .cc-phone{ font-size:13px; color:var(--muted); }
.courier-card .cc-acts{ display:flex; gap:8px; }
.call-btn{ display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:9px;
  background:#e6f5e9; color:#1a7a35; font-weight:700; font-size:13px; text-decoration:none;
  border:1.5px solid #b2dfb8; transition:.12s; }
.call-btn:hover{ background:#1a7a35; color:#fff; }
.courier-track{ font-size:12px; margin-top:4px; color:var(--muted); }

/* ===================== TABLET (820px) ===================== */
@media (max-width:820px){
  .stats{ grid-template-columns:repeat(2,1fr); gap:12px; }
  .side{ width:64px; }
  .side .brand .bwm, .side nav button span:not(.ic), .side .logout span:not(.ic){ display:none; }
  .side .brand{ justify-content:center; padding:16px 0; }
  .side nav button{ justify-content:center; padding:12px; }
  .side .logout{ justify-content:center; padding:12px; }
  .g2,.g3{ grid-template-columns:1fr 1fr; }
  .content{ padding:16px; }
  .topbar{ padding:12px 16px; }
}

/* ===================== MOBILE (600px) ===================== */
@media (max-width:600px){
  /* Hide desktop sidebar, show bottom nav */
  .side{ display:none; }
  .mob-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; height:62px;
    background:var(--pine); border-top:1px solid rgba(255,255,255,.12);
    z-index:50; align-items:stretch; overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .mob-nav button, .mob-nav a{
    flex:1 0 auto; min-width:62px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; color:#ffe0c4; font-size:10px; font-weight:600; font-family:inherit;
    border:none; background:none; cursor:pointer; transition:.15s; padding:6px 4px;
    text-decoration:none; -webkit-tap-highlight-color:transparent;
  }
  .mob-nav button .mn-ic, .mob-nav a .mn-ic{ font-size:20px; line-height:1; }
  .mob-nav button.on{ color:var(--leaf); }
  .mob-nav button:active, .mob-nav a:active{ background:rgba(255,255,255,.08); }

  /* Main adjustments */
  .main{ padding-bottom:62px; }
  .topbar{ padding:12px 14px; }
  .topbar h1{ font-size:17px; }
  .topbar .who{ font-size:12px; }
  .content{ padding:12px 12px 24px; }

  /* Stats — 2 columns on mobile */
  .stats{ grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
  .stat{ padding:12px 14px; }
  .stat .val{ font-size:22px; }
  .stat .ic{ font-size:20px; }
  .stat .lbl{ font-size:11px; }

  /* Panel head stacks on mobile */
  .panel-head{ flex-direction:column; align-items:stretch; gap:10px; padding:12px 14px; }
  .panel-head h2{ font-size:15px; }
  .panel-tools{ flex-direction:column; gap:8px; }
  .panel-tools input, .panel-tools select{ width:100%; height:42px; font-size:15px; }
  .panel-tools .b{ width:100%; justify-content:center; height:42px; }

  /* Hide desktop table, show mobile cards */
  .table-wrap table{ display:none; }
  .m-card-list{ display:block; padding:10px 12px 12px; }

  /* Modal full screen on mobile */
  .modal-bg{ padding:0; align-items:flex-end; }
  .modal{ border-radius:var(--r-lg) var(--r-lg) 0 0; max-height:92vh; display:flex; flex-direction:column; }
  .modal-body{ flex:1; overflow-y:auto; padding:14px 16px; }
  .modal-head{ padding:14px 16px; }
  .modal-foot{ padding:12px 16px; }
  .modal-foot .b{ flex:1; justify-content:center; height:46px; font-size:15px; }

  /* Form grids collapse */
  .g2,.g3{ grid-template-columns:1fr; gap:0; }

  /* Login */
  .login{ padding:24px 18px; border-radius:var(--r-lg); }

  /* Note box */
  .note-box{ font-size:12px; }
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div class="login-bg" id="loginScreen">
  <div class="login">
    <div class="lg"><span class="mark"></span><span class="bn"><span class="o">My</span> Health</span></div>
    <p>Admin Panel — sign in to manage products &amp; orders.</p>
    <label>Email</label>
    <input id="loginEmail" type="email" placeholder="admin email" value="mijanu443@gmail.com" />
    <label style="margin-top:12px">Password</label>
    <input id="loginPass" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="b b-green" onclick="doLogin()">Sign in</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">Firebase Auth diye login · password tomar Firebase account er</div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div class="admin-wrap" id="adminApp" style="display:none">
  <aside class="side">
    <div class="brand"><span class="mark"></span><span class="bwm"><span class="bn"><span class="o">My</span> Health</span><small>Admin</small></span></div>
    <nav>
      <button class="on" data-tab="dashboard" onclick="go('dashboard')"><span class="ic">📊</span><span>Dashboard</span></button>
      <button data-tab="products" onclick="go('products')"><span class="ic">📦</span><span>Products</span></button>
      <button data-tab="orders" onclick="go('orders')"><span class="ic">🧾</span><span>Orders</span></button>
      <button data-tab="courier" onclick="go('courier')"><span class="ic">🚚</span><span>Courier</span></button>
      <button data-tab="settings" onclick="go('settings')"><span class="ic">⚙️</span><span>Settings</span></button>
    </nav>
    <a class="logout" href="index.html" target="_blank"><span class="ic">🛍️</span><span>View store</span></a>
    <button class="logout" onclick="logout()"><span class="ic">⏏️</span><span>Logout</span></button>
  </aside>

  <main class="main">
    <div class="topbar"><h1 id="pageTitle">Dashboard</h1><div class="who">👤 <span id="adminEmail">Admin</span></div></div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- ===================== MOBILE BOTTOM NAV ===================== -->
<nav class="mob-nav" id="mobNav">
  <button class="on" data-tab="dashboard" onclick="go('dashboard')"><span class="mn-ic">📊</span>Dashboard</button>
  <button data-tab="products" onclick="go('products')"><span class="mn-ic">📦</span>Products</button>
  <button data-tab="orders" onclick="go('orders')"><span class="mn-ic">🧾</span>Orders</button>
  <button data-tab="courier" onclick="go('courier')"><span class="mn-ic">🚚</span>Courier</button>
  <button data-tab="settings" onclick="go('settings')"><span class="mn-ic">⚙️</span>Settings</button>
  <a href="index.html" target="_blank"><span class="mn-ic">🛍️</span>Store</a>
  <button onclick="logout()"><span class="mn-ic">⏏️</span>Logout</button>
</nav>

<!-- ===================== MODAL ===================== -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="product.js"></script>
<script>
/* ============================ FIREBASE AUTH ============================ */
const ADMIN = { productsKey:'products', ordersKey:'orders' };
/* Cloudflare Worker — courier proxy (Steadfast direct parcel) */
const COURIER_WORKER = "https://myhealthcourier.mijanu443.workers.dev/";
/* ei courier id gula Worker API support kore (key boshale live hobe) */
const API_COURIERS = ['steadfast','pathao','redx'];
/* Steadfast key admin Settings theke ase, Firebase adminConfig/courierKeys e save thake.
   Key Worker-e hardcode kora NA — client nije Settings e boshay. */
let COURIER_KEYS = { sfKey:'', sfSecret:'' };
const CATS = [
  {id:"immunity",label:"Immunity",emoji:"🛡️"},{id:"energy",label:"Energy",emoji:"⚡"},
  {id:"muscle",label:"Muscle",emoji:"💪"},{id:"brain",label:"Brain",emoji:"🧠"},
  {id:"sleep",label:"Sleep",emoji:"🌙"},{id:"bones",label:"Bones",emoji:"🦴"},
  {id:"weight",label:"Weight",emoji:"⚖️"},{id:"skin",label:"Skin & Hair",emoji:"✨"},
  {id:"hair",label:"Hair Care",emoji:"💇"},{id:"makeup",label:"Makeup",emoji:"💄"},
  {id:"baby",label:"Mother & Baby",emoji:"👶"},{id:"men",label:"Men's Care",emoji:"🧔"},
  {id:"bodycare",label:"Body Care",emoji:"🧴"},{id:"facecare",label:"Face Care",emoji:"🌿"},
  {id:"food",label:"Foods",emoji:"☕"},
];
const TAGS = ["flash","best","new"];

const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => '৳' + Number(n||0).toLocaleString('en-IN');

/* backward compat: purana product e goal string thakle cats array e convert */
const getCats = p => {
  if(Array.isArray(p.cats) && p.cats.length) return p.cats;
  if(p.goal) return [p.goal];
  return [];
};
const catLabels = p => getCats(p).map(id=>{
  const c = CATS.find(x=>x.id===id);
  return c ? `${c.emoji} ${c.label}` : id;
});
/* legacy alias */
const goalLabel = id => { const c=CATS.find(x=>x.id===id); return c?c.label:id; };

let products = [];
let orders = [];
let curTab = 'dashboard';
let seeded = false;

function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  if(!window.fauth){ err.textContent = 'Firebase load hoyni — internet check koro.'; return; }
  err.textContent = 'Signing in…';
  window.fauth.signInWithEmailAndPassword(email, pass)
    .catch(e=>{ err.textContent = ({
      'auth/invalid-credential':'Email ba password thik na.',
      'auth/wrong-password':'Password thik na.',
      'auth/user-not-found':'Ei email e kono user nai.',
      'auth/invalid-email':'Email format thik na.',
    })[e.code] || e.message; });
}
function logout(){ if(window.fauth) window.fauth.signOut(); }

/* gate: only the admin email gets in */
if(window.fauth){
  window.fauth.onAuthStateChanged(user=>{
    if(user && user.email === window.ADMIN_EMAIL){ startApp(); }
    else if(user){ window.fauth.signOut(); document.getElementById('loginErr').textContent='Ei account admin na.'; }
    else { showLogin(); }
  });
} else {
  document.getElementById('loginErr').textContent = 'Firebase load hoyni. Internet/host check koro.';
}

function showLogin(){
  document.getElementById('adminApp').style.display='none';
  document.getElementById('loginScreen').style.display='grid';
}
function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminApp').style.display='flex';
  document.getElementById('adminEmail') && (document.getElementById('adminEmail').textContent = window.ADMIN_EMAIL);
  attachListeners();
  attachCourierListeners();
  loadCourierKeys();
  go('dashboard');
}

/* Steadfast key Firebase theke load (admin-only read) */
function loadCourierKeys(){
  window.fdb.ref('adminConfig/courierKeys').once('value').then(snap=>{
    const d = snap.val() || {};
    COURIER_KEYS.sfKey    = d.sfKey    || '';
    COURIER_KEYS.sfSecret = d.sfSecret || '';
  }).catch(e=> console.warn('courierKeys load failed:', e.message));
}

/* ============================ FIREBASE DATA (realtime) ============================ */
function attachListeners(){
  window.fdb.ref(ADMIN.productsKey).on('value', snap=>{
    const val = snap.val();
    products = val ? Object.values(val).filter(Boolean) : [];
    products.sort((a,b)=>(b.id||0)-(a.id||0));
    // first-time seed from product.js if Firebase khali
    if(!products.length && !seeded && typeof PRODUCTS!=='undefined' && PRODUCTS.length){
      seeded = true; seedProducts();
      return;
    }
    if(['dashboard','products'].includes(curTab)) renderCurrent();
  });
  window.fdb.ref(ADMIN.ordersKey).on('value', snap=>{
    const val = snap.val();
    orders = val ? Object.entries(val).map(([k,v])=>({_key:k, ...v})) : [];
    orders.sort((a,b)=> new Date(b.placedAt||0) - new Date(a.placedAt||0));
    if(['dashboard','orders'].includes(curTab)) renderCurrent();
  });
}
function seedProducts(){
  const obj = {};
  PRODUCTS.forEach(p=>{ obj[p.id] = p; });
  window.fdb.ref(ADMIN.productsKey).set(obj)
    .then(()=>console.log('Seeded', PRODUCTS.length, 'products to Firebase'))
    .catch(e=>alert('Seed failed: '+e.message));
}
function renderCurrent(){ ({dashboard:renderDashboard,products:renderProducts,orders:renderOrders,courier:renderCourier,settings:renderSettings}[curTab]||renderDashboard)(); }

function thumb(p){
  return p.img ? `<img class="t-img" src="${esc(p.img)}" alt="" onerror="this.outerHTML='<div class=\\'t-emoji\\'>${p.emoji||'💊'}</div>'">`
               : `<div class="t-emoji">${p.emoji||'💊'}</div>`;
}
function fmtDate(iso){ try{ const d=new Date(iso); return d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }catch(e){ return '-'; } }

/* ============================ ROUTER ============================ */
function go(tab){
  curTab = tab;
  document.querySelectorAll('.side nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  document.querySelectorAll('.mob-nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  document.getElementById('pageTitle').textContent = ({dashboard:'Dashboard',products:'Products',orders:'Orders',courier:'Courier',settings:'Settings'})[tab];
  renderCurrent();
}

/* ============================ DASHBOARD ============================ */
function renderDashboard(){
  const pending = orders.filter(o=>o.status==='pending').length;
  const revenue = orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const recent = orders.slice(0,6);
  document.getElementById('content').innerHTML = `
    <div class="stats">
      <div class="stat green"><span class="ic">📦</span><div class="lbl">Products</div><div class="val">${products.length}</div></div>
      <div class="stat"><span class="ic">🧾</span><div class="lbl">Total Orders</div><div class="val">${orders.length}</div></div>
      <div class="stat amber"><span class="ic">⏳</span><div class="lbl">Pending</div><div class="val">${pending}</div></div>
      <div class="stat green"><span class="ic">💰</span><div class="lbl">Revenue</div><div class="val">${money(revenue)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Recent Orders</h2><button class="b b-ghost b-sm" onclick="go('orders')">View all →</button></div>
      ${recent.length ? `
      <div class="table-wrap">
        <table><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>
          ${recent.map(o=>`<tr>
            <td><b>${esc(o.id)}</b></td>
            <td>${esc(o.customer?.name||'-')}<div class="tag-mini">${esc(o.customer?.phone||'')}</div></td>
            <td><b>${money(o.total)}</b></td>
            <td><span class="pill" style="background:#f5ece2">${esc(o.status||'pending')}</span></td>
            <td class="tag-mini">${fmtDate(o.placedAt)}</td>
          </tr>`).join('')}
        </tbody></table>
      </div>
      <div class="m-card-list">
        ${recent.map(o=>`<div class="m-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:800;font-size:14px;font-family:var(--display)">${esc(o.id)}</div>
              <div style="font-weight:600;font-size:13px">${esc(o.customer?.name||'-')}</div>
              <div class="tag-mini">${fmtDate(o.placedAt)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800;font-size:16px;font-family:var(--display)">${money(o.total)}</div>
              <span class="pill" style="background:#f5ece2;margin-top:4px;display:inline-block">${esc(o.status||'pending')}</span>
            </div>
          </div>
        </div>`).join('')}
      </div>
      ` : `<div class="empty"><div class="e">🧾</div>No orders yet. Checkout theke order asle ekhane dekhabe.</div>`}
    </div>`;
}

/* ============================ PRODUCTS ============================ */
let prodSearch = '';
let catFilter = 'all';
function renderProducts(){
  const list = products.filter(p => {
    const matchSearch = !prodSearch || (p.name||'').toLowerCase().includes(prodSearch) || catLabels(p).join(' ').toLowerCase().includes(prodSearch);
    const matchCat = catFilter==='all' || getCats(p).includes(catFilter);
    return matchSearch && matchCat;
  });
  const catOpts = `<option value="all">All Categories</option>`
    + CATS.map(c=>`<option value="${c.id}" ${catFilter===c.id?'selected':''}>${c.emoji} ${c.label}</option>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <h2>Products (${products.length})</h2>
        <div class="panel-tools">
          <input placeholder="🔍 Search products…" value="${esc(prodSearch)}" oninput="prodSearch=this.value.toLowerCase();renderProducts()">
          <select onchange="catFilter=this.value;renderProducts()">${catOpts}</select>
          <button class="b b-ghost b-sm" onclick="exportProducts()">⬇️ Backup .js</button>
          <button class="b b-green b-sm" onclick="openProduct()">＋ Add Product</button>
        </div>
      </div>
      ${list.length ? `
      <div class="table-wrap">
        <table><thead><tr><th>Product</th><th>Categories</th><th>Price</th><th>Stock</th><th>Tags</th><th></th></tr></thead><tbody>
          ${list.map(p=>`<tr>
            <td><div style="display:flex;gap:11px;align-items:center">${thumb(p)}<div><b>${esc(p.name)}</b><div class="tag-mini">${esc(p.brand||'')} ${p.size?'· '+esc(p.size):''}</div></div></div></td>
            <td><div style="display:flex;flex-wrap:wrap;gap:4px">${getCats(p).map(id=>{const c=CATS.find(x=>x.id===id);return c?`<span class="pill goal">${c.emoji} ${c.label}</span>`:''}).join('')||'<span class="tag-mini">—</span>'}</div></td>
            <td><b>${money(p.price)}</b>${p.oldPrice>p.price?`<div class="tag-mini" style="text-decoration:line-through">${money(p.oldPrice)}</div>`:''}</td>
            <td>${stockCell(p)}</td>
            <td class="tag-mini">${(p.tags||[]).join(', ')||'—'}</td>
            <td><div class="row-acts">
              <button class="b b-ghost b-sm" onclick="openProduct(${p.id})">Edit</button>
              <button class="b b-rose b-sm" onclick="delProduct(${p.id})">Delete</button>
            </div></td>
          </tr>`).join('')}
        </tbody></table>
      </div>
      <div class="m-card-list">
        ${list.map(p=>`<div class="m-card">
          <div class="m-card-top">
            ${thumb(p)}
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:15px">${esc(p.name)}</div>
              <div class="tag-mini">${esc(p.brand||'')}${p.size?' · '+esc(p.size):''}</div>
              <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${getCats(p).map(id=>{const c=CATS.find(x=>x.id===id);return c?`<span class="pill goal">${c.emoji} ${c.label}</span>`:''}).join('')}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800;font-size:16px;font-family:var(--display)">${money(p.price)}</div>
              ${p.oldPrice>p.price?`<div class="tag-mini" style="text-decoration:line-through">${money(p.oldPrice)}</div>`:''}
            </div>
          </div>
          <div style="margin:8px 0 10px">${stockCell(p)}</div>
          <div class="m-card-acts">
            <button class="b b-ghost b-sm" onclick="openProduct(${p.id})" style="flex:1;justify-content:center">✏️ Edit</button>
            <button class="b b-rose b-sm" onclick="delProduct(${p.id})" style="flex:1;justify-content:center">🗑️ Delete</button>
          </div>
        </div>`).join('')}
      </div>
      ` : `<div class="empty"><div class="e">📦</div>No products found.</div>`}
    </div>
    <div class="note-box">☁️ <b>Live:</b> ekhane add/edit/delete korle shoja <b>Firebase</b> e save hoy — website e (sob device) sathe sathe update hobe. Commit/export lagbe na.</div>`;
}

function openProduct(id){
  const p = id!=null ? products.find(x=>x.id===id) : null;
  const isEdit = !!p;
  const selCats = getCats(p || {});
  const tagChecks = TAGS.map(t=>`<label style="display:inline-flex;gap:5px;align-items:center;font-weight:500;margin-right:14px">
     <input type="checkbox" id="pt_${t}" ${p&&(p.tags||[]).includes(t)?'checked':''}> ${t}</label>`).join('');
  document.getElementById('modal').innerHTML = `
    <div class="modal-head"><h3>${isEdit?'Edit':'Add'} Product</h3><button onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="fld"><label>Product name *</label><input id="p_name" value="${esc(p?.name||'')}" placeholder="e.g. Whey Protein Isolate 2kg"></div>
      <div class="g2">
        <div class="fld"><label>Brand</label><input id="p_brand" value="${esc(p?.brand||'')}" placeholder="e.g. NutriPro"></div>
        <div class="fld"><label>Emoji</label><input id="p_emoji" value="${esc(p?.emoji||'💊')}" maxlength="4"></div>
      </div>
      <div class="fld">
        <label>Categories * <span style="color:var(--muted);font-weight:400;font-size:12px">(একাধিক select করা যাবে)</span></label>
        <div class="msd" id="msd">
          <button type="button" class="msd-trigger" id="msd-trigger" onclick="msdToggle()">
            <span class="msd-placeholder" id="msd-placeholder">Category বেছে নাও…</span>
          </button>
          <div class="msd-menu" id="msd-menu">
            <div class="msd-search"><input id="msd-search" placeholder="🔍 Search category…" oninput="msdFilter(this.value)" onclick="event.stopPropagation()"></div>
            <div class="msd-list" id="msd-list"></div>
            <div class="msd-footer"><span id="msd-count">0 selected</span><button onclick="msdClear()">Clear all</button></div>
          </div>
        </div>
      </div>
      <div class="g3">
        <div class="fld"><label>Price (৳) *</label><input id="p_price" type="number" value="${p?.price||''}"></div>
        <div class="fld"><label>Old price (৳)</label><input id="p_old" type="number" value="${p?.oldPrice||''}"></div>
        <div class="fld"><label>Size / pack</label><input id="p_size" value="${esc(p?.size||'')}" placeholder="60 capsules"></div>
      </div>
      <div class="fld"><label>Image URL</label><input id="p_img" value="${esc(p?.img||'')}" placeholder="images/product.jpg or https://…"></div>
      <div class="g3">
        <div class="fld"><label>Timing</label><select id="p_timing">
          ${['morning','postworkout','night','anytime'].map(t=>`<option value="${t}" ${p?.timing===t?'selected':''}>${t}</option>`).join('')}
        </select></div>
        <div class="fld"><label>Rating</label><input id="p_rating" type="number" step="0.1" min="0" max="5" value="${p?.rating||4.7}"></div>
        <div class="fld"><label>Reviews</label><input id="p_reviews" type="number" value="${p?.reviews||0}"></div>
      </div>
      <div class="fld"><label>Description</label><textarea id="p_desc" placeholder="Short product description…">${esc(p?.desc||'')}</textarea></div>
      <div class="fld"><label>Benefits (one per line)</label><textarea id="p_benefits" placeholder="Boosts immunity">${esc((p?.benefits||[]).join('\n'))}</textarea></div>
      <div class="fld"><label>Tags</label><div>${tagChecks}</div></div>
    </div>
    <div class="modal-foot">
      <button class="b b-ghost" onclick="closeModal()">Cancel</button>
      <button class="b b-green" onclick="saveProduct(${isEdit?p.id:'null'})">${isEdit?'Save changes':'Add product'}</button>
    </div>`;
  openModal();
  msdInit(selCats);
}
function saveProduct(id){
  const v = i => document.getElementById(i).value.trim();
  const name = v('p_name'), price = parseInt(v('p_price'),10);
  if(!name || !price){ alert('Name আর Price দিতে হবে।'); return; }
  const selCats = msdGetSelected();
  if(!selCats.length){ alert('অন্তত একটা Category select করতে হবে।'); return; }
  const existing = id!=null ? products.find(x=>x.id===id) : null;
  const newId = id!=null ? id : (products.reduce((m,p)=>Math.max(m,p.id||0),0)+1);
  const data = {
    id: newId, name, cats: selCats,
    goal: selCats[0], /* backward compat for storefront */
    brand: v('p_brand'),
    price, oldPrice: parseInt(v('p_old'),10) || price,
    emoji: v('p_emoji') || '💊', img: v('p_img'),
    timing: v('p_timing'), rating: parseFloat(v('p_rating'))||4.7, reviews: parseInt(v('p_reviews'),10)||0,
    size: v('p_size'), desc: v('p_desc'),
    benefits: v('p_benefits').split('\n').map(s=>s.trim()).filter(Boolean),
    tags: TAGS.filter(t=>document.getElementById('pt_'+t).checked),
    use: (existing && existing.use) || {dose:'', when:'', duration:''}
  };
  window.fdb.ref(ADMIN.productsKey+'/'+newId).set(data)
    .then(()=>{ closeModal(); })
    .catch(e=>alert('Save failed: '+e.message));
}

/* ================================================================
   MSD — Multi-Select Dropdown engine
   ================================================================ */
let _msdSel = [];

function msdInit(initSel = []) {
  _msdSel = [...initSel];
  msdRenderList('');
  msdRenderTrigger();
  setTimeout(()=>{
    document.addEventListener('click', msdOutside);
  }, 50);
}
function msdOutside(e){
  const msd = document.getElementById('msd');
  if(msd && !msd.contains(e.target)) msdClose();
}
function msdToggle(){
  const msd = document.getElementById('msd');
  if(!msd) return;
  if(msd.classList.contains('open')){ msdClose(); }
  else {
    msd.classList.add('open');
    setTimeout(()=>document.getElementById('msd-search')?.focus(), 60);
  }
}
function msdClose(){
  document.getElementById('msd')?.classList.remove('open');
}
function msdFilter(q){
  msdRenderList(q.toLowerCase());
}
function msdRenderList(q){
  const list = document.getElementById('msd-list');
  if(!list) return;
  const filtered = q ? CATS.filter(c=>c.label.toLowerCase().includes(q)||c.emoji.includes(q)) : CATS;
  list.innerHTML = filtered.map(c=>{
    const on = _msdSel.includes(c.id);

function msdRenderTrigger(){
  const trigger = document.getElementById('msd-trigger');
  const count   = document.getElementById('msd-count');
  if(!trigger) return;
  trigger.innerHTML = '';
  if(_msdSel.length === 0){
    trigger.innerHTML = `<span class="msd-placeholder">Category বেছে নাও…</span>`;
  } else {
    _msdSel.forEach(id=>{
      const c = CATS.find(x=>x.id===id);
      if(!c) return;
      const pill = document.createElement('span');
      pill.className = 'msd-pill';
      pill.innerHTML = `${c.emoji} ${c.label}<span class="rm" onclick="event.stopPropagation();msdRemove('${c.id}')">×</span>`;
      trigger.appendChild(pill);
    });
  }
  const arr = document.createElement('span');
  arr.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px';
  arr.textContent = '▾';
  trigger.appendChild(arr);
  if(count) count.textContent = `${_msdSel.length} selected`;
}
function msdRemove(id){
  _msdSel = _msdSel.filter(x=>x!==id);

  const q = document.getElementById('msd-search')?.value || '';
  msdRenderList(q.toLowerCase());

  msdRenderList(q.toLowerCase());
}

async function submitPickup(orderKey, orderId){
  const courierId = document.getElementById('pu_courier').value;
  const note      = document.getElementById('pu_note').value.trim();
  const o = orders.find(x=>x._key===orderKey);
  const btn = document.querySelector('.modal-foot .b-green');
  const reset = ()=>{ if(btn){ btn.disabled=false; btn.textContent='🚚 Pickup Request দাও'; } };
  if(btn){ btn.disabled=true; btn.textContent='পাঠানো হচ্ছে…'; }

  let consignment_id=null, tracking_code=null, courierStatus='manual';

  /* Steadfast (ba onno API courier) hole Worker diye DIRECT parcel pathao.
     Custom/manual courier hole sudhu local record (age-er moto). */
  if(o && API_COURIERS.includes(courierId)){
    // Steadfast hole key thakte hobe (Settings e boshano)
    if(courierId === 'steadfast' && (!COURIER_KEYS.sfKey || !COURIER_KEYS.sfSecret)){
      reset();
      return alert('⚠️ Steadfast Api-Key/Secret-Key boshano nei.\nSettings → Courier API te key boshiye Save koro, tarpor abar try koro.');
    }
    try {
      const addr = [o.customer?.address, o.customer?.district, o.customer?.division].filter(Boolean).join(', ');
      const cod  = (o.payment === 'cod') ? Number(o.total||0) : 0;  // prepaid hole COD = 0
      const res  = await fetch(COURIER_WORKER, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          courier: courierId,
          api_key:    COURIER_KEYS.sfKey,
          secret_key: COURIER_KEYS.sfSecret,
          invoice: orderId,
          recipient_name:  o.customer?.name  || '',
          recipient_phone: o.customer?.phone || '',
          recipient_address: addr,
          cod_amount: cod,
          note
        })
      });
      const data = await res.json().catch(()=>({}));
      if(data.ok){
        consignment_id = data.consignment_id;
        tracking_code  = data.tracking_code;
        courierStatus  = data.status || 'sent';
      } else {
        reset();
        return alert('❌ '+courierId+' এ parcel পাঠাতে পারলাম না:\n'
          + (data.error || data.message || 'Unknown error')
          + '\n\n(Internet / Worker-er API key check করো, নাহলে courier app এ manually add করো।)');
      }
    } catch(err){
      reset();
      return alert('❌ Worker call fail হলো: ' + err.message + '\nInternet check করো।');
    }
  }

  /* pickup record + order update Firebase e save */
  const key  = 'pu_' + Date.now();
  const data = { orderId, orderKey, courierId, note, consignment_id, tracking_code,
                 status:'pending', courierStatus, requestedAt:new Date().toISOString() };
  try {
    await window.fdb.ref('pickups/'+key).set(data);
    const upd = { status:'confirmed' };
    if(consignment_id) upd.consignment_id = consignment_id;
    if(tracking_code)  upd.tracking_code  = tracking_code;
    await window.fdb.ref(ADMIN.ordersKey+'/'+orderKey).update(upd);
    closeModal();
    alert(consignment_id
      ? `✅ Steadfast এ parcel create হলো!\nConsignment: ${consignment_id}\nTracking: ${tracking_code||'-'}`
      : '✅ Pickup request saved! Courier tab এ দেখো।');
  } catch(e){
    reset();
    alert('Firebase save failed: ' + e.message);
  }
}

      <div class="od-row"><span style="color:var(--muted)">Address</span><b style="text-align:right;max-width:60%">${esc(c.address)}, ${esc(c.district)}, ${esc(c.division)}</b></div>
      ${c.note?`<div class="od-row"><span style="color:var(--muted)">Note</span><b>${esc(c.note)}</b></div>`:''}
      <h3 style="font-size:15px;margin:16px 0 6px">Items</h3>
      <div class="od-items">${(o.items||[]).map(i=>`<div class="it"><span>${esc(i.name)} × ${i.qty}</span><b>${money(i.price*i.qty)}</b></div>`).join('')}</div>
      <div class="od-row"><span style="color:var(--muted)">Subtotal</span><span>${money(o.subtotal)}</span></div>
      ${o.discount?`<div class="od-row"><span style="color:var(--muted)">Discount ${o.coupon?'('+esc(o.coupon)+')':''}</span><span>-${money(o.discount)}</span></div>`:''}
      <div class="od-row"><span style="color:var(--muted)">Delivery</span><span>${o.delivery?money(o.delivery):'FREE'}</span></div>
      <div class="od-row" style="font-size:18px;font-weight:800;font-family:var(--display);border-top:1px solid var(--line);padding-top:10px;margin-top:6px"><span>Total</span><span>${money(o.total)}</span></div>
      <div class="od-row"><span style="color:var(--muted)">Payment</span><b>${esc((o.payment||'').toUpperCase())}</b></div>
    </div>
    <div class="modal-foot">
      <button class="b b-ghost" onclick="window.print()">🖨️ Print</button>
      <button class="b b-green" style="background:#1a7a35" onclick="closeModal();openPickupModal('${esc(o._key)}')">🚚 Pickup Request</button>
      <button class="b b-green" onclick="closeModal()">Close</button>
    </div>`;
  openModal();
}

/* ============================ SETTINGS ============================ */
function renderSettings(){
  document.getElementById('content').innerHTML = `
    <div class="panel" style="max-width:560px">
      <div class="panel-head"><h2>Account</h2></div>
      <div style="padding:20px">
        <div class="od-row"><span style="color:var(--muted)">Logged in as</span><b>${esc(window.ADMIN_EMAIL||'')}</b></div>
        <p style="color:var(--muted);font-size:13px;margin:10px 0 16px">Password change korte Firebase Console → Authentication → Users theke koro, ba "Forgot password" reset email use koro.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="b b-ghost" href="index.html" target="_blank" rel="noopener">🛍️ View store</a>
          <button class="b" style="background:var(--rose);color:#fff" onclick="logout()">⏏️ Logout</button>
        </div>
      </div>
    </div>
    <div class="panel" style="max-width:560px">
      <div class="panel-head"><h2>🚚 Courier API (Steadfast)</h2></div>
      <div style="padding:20px">
        <p style="color:var(--muted);font-size:13px;margin:0 0 14px">
          Steadfast merchant panel → <b>Settings → API</b> theke Api-Key ar Secret-Key niye ekhane boshao.
          Save korle Pickup request thika <b>direct Steadfast e parcel</b> create hobe.
        </p>
        <div class="fld"><label>Steadfast Api-Key</label>
          <input id="sfApiKey" placeholder="${COURIER_KEYS.sfKey ? '•••••••• (saved · '+esc(COURIER_KEYS.sfKey.slice(-4))+')' : 'Api-Key paste koro'}" autocomplete="off"></div>
        <div class="fld"><label>Steadfast Secret-Key</label>
          <input id="sfApiSecret" placeholder="${COURIER_KEYS.sfSecret ? '•••••••• (saved · '+esc(COURIER_KEYS.sfSecret.slice(-4))+')' : 'Secret-Key paste koro'}" autocomplete="off"></div>
        <div id="sfKeyMsg" style="display:none;font-size:13px;margin:6px 0 12px"></div>
        <button class="b b-green" onclick="saveCourierKeys()">💾 Save Keys</button>
        <p style="color:var(--muted);font-size:12px;margin-top:12px">
          🔒 Key gulo Firebase e admin-only kore rakha thake — public na. Khali rakhle purono key thakbe (overwrite hobe na).
        </p>
      </div>
    </div>
    <div class="panel" style="max-width:560px">
      <div class="panel-head"><h2>Data</h2></div>
      <div style="padding:20px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="b b-ghost" onclick="exportProducts()">⬇️ Backup product.js</button>
        <button class="b b-ghost" onclick="exportOrders()">⬇️ Export orders CSV</button>
      </div>
    </div>
    <div class="note-box" style="max-width:560px">☁️ Product + order sob <b>Firebase</b> e live ase. Sob device theke ek-i data dekhabe.</div>`;
}

/* client je key boshay seta Firebase adminConfig e save (admin-only).
   khali box overwrite kore na — sudhu ja deya hoyeche tai update hoy. */
async function saveCourierKeys(){
  const k = (document.getElementById('sfApiKey').value||'').trim();
  const s = (document.getElementById('sfApiSecret').value||'').trim();
  const msg = document.getElementById('sfKeyMsg');
  const show = (t,ok)=>{ msg.style.display='block'; msg.style.color=ok?'#1a7a35':'#c0392b'; msg.textContent=t; };

  if(!k && !s){ show('Kichu boshale tobe save hobe.', false); return; }
  const payload = {};
  if(k) payload.sfKey = k;
  if(s) payload.sfSecret = s;
  try{
    await window.fdb.ref('adminConfig/courierKeys').update(payload);
    if(k) COURIER_KEYS.sfKey = k;
    if(s) COURIER_KEYS.sfSecret = s;
    document.getElementById('sfApiKey').value = '';
    document.getElementById('sfApiSecret').value = '';
    show('✅ Keys save hoyeche! Ekhon Pickup request direct Steadfast e jabe.', true);
    renderSettings(); // placeholder e masked value dekhabe
  }catch(e){ show('❌ Save failed: '+e.message, false); }
}

/* ============================ EXPORTS ============================ */
function download(name, text, type){
  const blob = new Blob([text], {type:type||'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
function exportProducts(){
  const header = `/* MY HEALTH — product.js backup (admin theke export)
   Eta product.js er content. Use korte: ei file-er bhitor-er sob copy kore
   tomar product.js e paste koro (ba file ta rename kore product.js koro). */\n\n`;
  // .txt hisebe namabo -> browser ".js harmful" warning dey na
  download('product.js.txt', header + 'const PRODUCTS = ' + JSON.stringify(products, null, 2) + ';\n', 'text/plain');
}
function exportOrders(){
  const head = ['Order ID','Date','Name','Phone','Division','District','Address','Items','Subtotal','Discount','Delivery','Total','Payment','Status'];
  const rows = orders.map(o=>{
    const c=o.customer||{};
    const items=(o.items||[]).map(i=>`${i.name} x${i.qty}`).join(' | ');
    return [o.id, o.placedAt, c.name, c.phone, c.division, c.district, c.address, items, o.subtotal, o.discount, o.delivery, o.total, o.payment, o.status]
      .map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',');
  });
  download('myhealth-orders.csv', [head.join(','), ...rows].join('\n'), 'text/csv');
}

/* ============================ MODAL ============================ */
function openModal(){ document.getElementById('modalBg').classList.add('open'); }
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  document.removeEventListener('click', msdOutside);
}
document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });
</script>
